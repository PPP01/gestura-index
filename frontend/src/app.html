<!doctype html>
<html lang="%paraglide.lang%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// No-Flash-Theme-Init (Muster der Extension: data-theme, 'auto' folgt dem System).
			// Muss vor dem ersten Paint laufen, deshalb inline im <head>.
			(function () {
				var theme = 'auto';
				try {
					theme = localStorage.getItem('gestura_index_theme') || 'auto';
				} catch (e) {}
				var actual =
					theme === 'auto'
						? matchMedia('(prefers-color-scheme: light)').matches
							? 'light'
							: 'dark'
						: theme;
				document.documentElement.setAttribute('data-theme', actual);
			})();
		</script>
		<script>
			// Sprach-Weiche für die nackte Wurzel /: schon vor dem ersten Paint auf /en
			// bzw. /de umleiten, damit die englische Startseite nicht kurz aufblitzt.
			// Reihenfolge wie Paraglide: Cookie → Browsersprache → en (Fallback).
			(function () {
				if (location.pathname !== '/') return;
				var lang;
				try {
					var m = document.cookie.match(/(?:^|;\s*)PARAGLIDE_LOCALE=([^;]+)/);
					lang = m && decodeURIComponent(m[1]);
				} catch (e) {}
				if (lang !== 'de' && lang !== 'en') {
					lang = (navigator.language || 'en').slice(0, 2) === 'de' ? 'de' : 'en';
				}
				location.replace('/' + lang + location.search + location.hash);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
